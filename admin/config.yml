backend:
  name: github
  repo: yy0534105830-source/news
  branch: main

media_folder: images
public_folder: images
locale: he

collections:
  - name: blog
    label: כתבות ומאמרים
    folder: content/blog
    create: true
    fields:
      - label: כותרת ראשית
        name: title
        widget: string
      - label: כותרת משנה
        name: subtitle
        widget: string
        required: false
      - label: תמונה ראשית
        name: thumbnail
        widget: image
      - label: קטגוריה
        name: category
        widget: select
        options: ["חדשות", "פוליטיקה", "כלכלה", "בריאות"]
        default: "חדשות"
      - label: תוכן הכתבה
        name: body
        widget: markdown

  - name: flashes
    label: מבזקי חדשות
    folder: content/flashes
    create: true
    fields:
      - label: תוכן המבזק
        name: title
        widget: string
