backend:
  name: github
  repo: yy0534105830-source/news
  branch: main

media_folder: "images"
public_folder: "images"

collections:
  - name: "blog"
    label: "כתבות"
    folder: "content/blog"
    create: true
    fields:
      - { label: "כותרת", name: "title", widget: "string" }
      - { label: "תמונה", name: "thumbnail", widget: "image" }
      - { label: "תוכן", name: "body", widget: "markdown" }

  - name: "flashes"
    label: "מבזקים"
    folder: "content/flashes"
    create: true
    fields:
      - { label: "מבזק", name: "title", widget: "string" }
