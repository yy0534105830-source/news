<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JDN - International News</title>
    <style>
        :root {
            --primary: #003366;
            --accent: #d32f2f;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text-dark: #1a1a1a;
            --text-muted: #555;
            --gold-accent: #c5a059; /* נגיעה של זהב ליוקרה */
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); margin: 0; color: var(--text-dark); line-height: 1.6; }

        /* כותרת יוקרתית */
        header { 
            background: var(--primary); 
            color: white; 
            padding: 20px 0; 
            text-align: center; 
            border-bottom: 4px solid var(--gold-accent);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        header h1 { margin: 0; font-size: 2.5rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 800; }

        /* פס מבזקים */
        .ticker { background: white; border-bottom: 1px solid #e0e0e0; height: 45px; display: flex; align-items: center; overflow: hidden; font-size: 0.95rem; }
        .ticker-label { background: var(--accent); color: white; padding: 0 20px; font-weight: bold; height: 100%; display: flex; align-items: center; z-index: 2; position: relative; }
        .ticker-text { white-space: nowrap; animation: ticker 50s linear infinite; padding-right: 100%; color: var(--primary); font-weight: 500; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(100%); } }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: 3fr 1fr; gap: 30px; }

        /* דף כתבה מלאה */
        #single-view { display: none; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .full-article { background: white; padding: 40px; border-radius: 4px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        .full-article h1 { font-size: 3rem; margin-bottom: 10px; line-height: 1.2; color: var(--primary); }
        .full-article .subtitle { font-size: 1.4rem; color: var(--text-muted); margin-bottom: 25px; font-weight: 300; border-right: 4px solid var(--gold-accent); padding-right: 15px; }
        .full-article img { width: 100%; border-radius: 4px; margin-bottom: 30px; }

        /* דף הבית */
        .main-hero { 
            position: relative; 
            background: white; 
            border-radius: 8px; 
            overflow: hidden; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
            cursor: pointer; 
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            margin-bottom: 40px;
        }
        .main-hero:hover { transform: translateY(-5px); }
        .main-hero img { height: 400px; width: 100%; object-fit: cover; }
        .hero-content { padding: 30px; border-bottom: 5px solid var(--primary); }
        .hero-content h2 { font-size: 2.2rem; margin: 0 0 10px 0; color: var(--primary); }
        .hero-content .subtitle { font-size: 1.2rem; color: var(--text-muted); font-weight: 400; margin-bottom: 15px; }

        /* גרידים */
        .grid { display: grid; gap: 20px; margin-bottom: 40px; }
        .grid-4 { grid-template-columns: repeat(4, 1fr); }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }

        .card { background: white; border-radius: 6px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; cursor: pointer; border: 1px solid #eee; }
        .card:hover { border-color: var(--gold-accent); transform: translateY(-5px); }
        .card img { height: 160px; width: 100%; object-fit: cover; }
        .card-body { padding: 15px; }
        .card h3 { font-size: 1.05rem; margin: 0; color: var(--primary); line-height: 1.4; height: 2.8em; overflow: hidden; }

        /* סיידבר */
        .sidebar { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .sidebar h3 { border-bottom: 2px solid var(--gold-accent); padding-bottom: 10px; margin-top: 0; color: var(--accent); }
        .flash-node { padding: 12px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; transition: 0.2s; }
        .flash-node:hover { color: var(--accent); }
        .time-tag { color: var(--accent); font-weight: 700; margin-left: 8px; }

        .btn-back { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 4px; cursor: pointer; margin-bottom: 30px; font-weight: 600; }

        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } .grid-4, .grid-3 { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

<header onclick="window.location.reload()">
    <h1>JDN NEWS</h1>
</header>

<div class="ticker">
    <div class="ticker-label">LATEST</div>
    <div class="ticker-text" id="ticker-content">טוען עדכונים בזמן אמת...</div>
</div>

<div class="container">
    <main id="view-home">
        <div id="hero-slot"></div>
        <div id="grid-4-slot" class="grid grid-4"></div>
        <div id="grid-3-slot" class="grid grid-3"></div>
    </main>

    <main id="view-single">
        <button class="btn-back" onclick="showHome()">← חזרה לדף הבית</button>
        <div id="article-detail" class="full-article"></div>
    </main>

    <aside class="sidebar">
        <h3>מבזקים</h3>
        <div id="flashes-slot"></div>
    </aside>
</div>

<script>
    const repo = 'yy0534105830-source/news';
    const baseUrl = 'https://yy0534105830-source.github.io/news/';
    let articlesData = [];

    async function loadAll() {
        try {
            const [bRes, fRes] = await Promise.all([
                fetch(`https://api.github.com/repos/${repo}/contents/content/blog`),
                fetch(`https://api.github.com/repos/${repo}/contents/content/flashes`)
            ]);

            const bFiles = (await bRes.json()).reverse();
            const fFiles = (await fRes.json()).reverse();

            // טעינת כתבות עם חילוץ כותרת משנה
            const articlePromises = bFiles.slice(0, 11).map(async f => {
                const r = await fetch(f.download_url);
                const t = await r.text();
                const meta = {};
                t.split('\n').forEach(line => {
                    if (line.startsWith('title:')) meta.title = line.replace('title:', '').trim().replace(/['"]/g, '');
                    if (line.startsWith('subtitle:')) meta.subtitle = line.replace('subtitle:', '').trim().replace(/['"]/g, '');
                    if (line.startsWith('thumbnail:')) meta.img = line.replace('thumbnail:', '').trim().replace(/['"]/g, '');
                });
                
                return {
                    ...meta,
                    img: meta.img ? (meta.img.startsWith('http') ? meta.img : baseUrl + meta.img.replace(/^\//, '')) : 'https://via.placeholder.com/800x450',
                    body: t.split('---').pop().trim()
                };
            });

            articlesData = await Promise.all(articlePromises);
            renderHome();

            // מבזקים
            let tick = ""; let side = "";
            for (let f of fFiles.slice(0, 10)) {
                const r = await fetch(f.download_url);
                const t = await r.text();
                const title = t.match(/title:\s*(.*)\n/)?.[1]?.replace(/['"]/g, '') || "";
                tick += ` • ${title} &nbsp;&nbsp;&nbsp; `;
                side += `<div class="flash-node"><span class="time-tag">${new Date().getHours()}:${new Date().getMinutes()}</span>${title}</div>`;
            }
            document.getElementById('ticker-content').innerHTML = tick;
            document.getElementById('flashes-slot').innerHTML = side;

        } catch (e) { console.error(e); }
    }

    function renderHome() {
        if (!articlesData.length) return;

        // Hero
        document.getElementById('hero-slot').innerHTML = `
            <div class="main-hero" onclick="showArticle(0)">
                <img src="${articlesData[0].img}">
                <div class="hero-content">
                    <h2>${articlesData[0].title}</h2>
                    <div class="subtitle">${articlesData[0].subtitle || ''}</div>
                </div>
            </div>`;

        // Grid 4
        document.getElementById('grid-4-slot').innerHTML = articlesData.slice(1, 5).map((a, i) => `
            <div class="card" onclick="showArticle(${i + 1})">
                <img src="${a.img}">
                <div class="card-body"><h3>${a.title}</h3></div>
            </div>`).join('');

        // Grid 3
        document.getElementById('grid-3-slot').innerHTML = articlesData.slice(5, 11).map((a, i) => `
            <div class="card" onclick="showArticle(${i + 5})">
                <img src="${a.img}">
                <div class="card-body"><h3>${a.title}</h3></div>
            </div>`).join('');
    }

    function showArticle(idx) {
        const a = articlesData[idx];
        document.getElementById('view-home').style.display = 'none';
        document.getElementById('view-single').style.display = 'block';
        document.getElementById('article-detail').innerHTML = `
            <h1>${a.title}</h1>
            ${a.subtitle ? `<div class="subtitle">${a.subtitle}</div>` : ''}
            <img src="${a.img}">
            <div style="font-size:1.2rem; white-space: pre-wrap;">${a.body}</div>
        `;
        window.scrollTo(0,0);
    }

    function showHome() {
        document.getElementById('view-home').style.display = 'block';
        document.getElementById('view-single').style.display = 'none';
    }

    loadAll();
</script>
</body>
</html>
