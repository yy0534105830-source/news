<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חדשות חרדים | פורטל החדשות</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&family=Frank+Ruhl+Libre:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #002347; --accent: #c5a059; --danger: #e31e24;
            --bg: #f4f7f9; --white: #ffffff; --text: #1a1a1a;
            --radius: 8px; --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }

        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); margin: 0; color: var(--text); overflow-x: hidden; }

        /* --- Header & Navigation --- */
        header { background: var(--primary); padding: 20px; text-align: center; color: white; border-bottom: 4px solid var(--accent); cursor: pointer; }
        header h1 { font-family: 'Frank Ruhl Libre', serif; font-size: 3rem; margin: 0; }
        .nav-wrapper { background: white; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 10px; display: flex; justify-content: center; gap: 20px; }
        .nav-link { font-weight: 800; color: var(--primary); cursor: pointer; padding: 5px 15px; transition: 0.2s; }
        .nav-link:hover { color: var(--accent); }

        .container { max-width: 1300px; margin: 20px auto; padding: 0 20px; }

        /* --- Hero Grid (The Fix) --- */
        .hero-grid { 
            display: grid; 
            grid-template-columns: 1.5fr 1fr 320px; 
            gap: 20px; 
            height: 500px; 
            margin-bottom: 40px; 
        }

        .hero-main { position: relative; border-radius: var(--radius); overflow: hidden; background: #ddd; cursor: pointer; box-shadow: var(--shadow); }
        .hero-side-stack { display: grid; grid-template-rows: 1fr 1fr; gap: 20px; }
        .hero-side-item { position: relative; border-radius: var(--radius); overflow: hidden; background: #ddd; cursor: pointer; box-shadow: var(--shadow); }

        /* --- N12 Style Flashes (Clean & Integrated) --- */
        .flashes-container { 
            background: white; 
            border-radius: var(--radius); 
            border-top: 4px solid var(--danger); 
            box-shadow: var(--shadow); 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
        }
        .flashes-header { padding: 15px; font-weight: 800; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #eee; background: #fff; }
        .live-dot { width: 10px; height: 10px; background: var(--danger); border-radius: 50%; animation: pulse 1s infinite; }
        .flashes-list { flex: 1; overflow-y: auto; background: white; }
        .flash-item { 
            padding: 12px 15px; 
            border-bottom: 1px solid #f0f0f0; 
            font-size: 0.95rem; 
            font-weight: 700; 
            display: block; 
            text-decoration: none; 
            color: var(--text);
            transition: background 0.2s;
        }
        .flash-item:hover { background: #f9f9f9; }
        .flash-time { color: var(--danger); margin-left: 8px; font-weight: 800; }

        /* --- News Cards --- */
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .news-card { background: white; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); cursor: pointer; transition: 0.3s; }
        .news-card:hover { transform: translateY(-5px); }
        .news-card img { width: 100%; height: 180px; object-fit: cover; }
        .card-body { padding: 15px; }

        .overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); color: white; }
        .overlay h2 { margin: 0; font-size: 1.4rem; line-height: 1.2; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* Mobile Fix */
        @media (max-width: 1000px) {
            .hero-grid { grid-template-columns: 1fr; height: auto; }
            .hero-main { height: 300px; }
            .flashes-container { height: 400px; }
        }
    </style>
</head>
<body>

<header onclick="window.location.reload()"><h1>חדשות חרדים</h1></header>
<div class="nav-wrapper" id="main-nav"></div>

<div class="container" id="home-view">
    <div class="hero-grid">
        <div id="main-slot" class="hero-main"></div>
        
        <div class="hero-side-stack" id="side-slots"></div>

        <div class="flashes-container">
            <div class="flashes-header"><div class="live-dot"></div>מבזקי חדשות</div>
            <div id="n12-flashes" class="flashes-list">
                <div style="padding:20px; text-align:center;">מעדכן מבזקים...</div>
            </div>
        </div>
    </div>

    <div id="news-grid" class="news-grid"></div>
</div>

<div id="article-view" class="container" style="display:none; background:white; padding:30px; border-radius:var(--radius); box-shadow:var(--shadow);">
    <button onclick="showHome()" style="background:var(--primary); color:white; border:none; padding:10px 20px; cursor:pointer; font-weight:800; margin-bottom:20px;">← חזרה</button>
    <div id="art-content"></div>
</div>

<script>
    const repo = 'yy0534105830-source/news';
    const rawBase = 'https://raw.githubusercontent.com/' + repo + '/main/';
    let articles = [];

    async function init() {
        await Promise.all([fetchFlashes(), fetchArticles()]);
    }

    // משיכת מבזקים מ-N12 והצגתם בעיצוב נקי שלך
    async function fetchFlashes() {
        try {
            const rssUrl = "https://xml.mako.co.il/syndication/rss/v1.xml"; // RSS של N12/Mako
            const proxy = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
            const res = await fetch(proxy);
            const data = await res.json();
            
            if (data.status === 'ok') {
                const html = data.items.map(item => {
                    const time = new Date(item.pubDate).toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit'});
                    return `<a href="${item.link}" target="_blank" class="flash-item"><span class="flash-time">${time}</span>${item.title}</a>`;
                }).join('');
                document.getElementById('n12-flashes').innerHTML = html;
            }
        } catch (e) {
            document.getElementById('n12-flashes').innerHTML = '<div style="padding:20px;">המבזקים יתעדכנו בקרוב...</div>';
        }
    }

    async function fetchArticles() {
        try {
            const res = await fetch(`https://api.github.com/repos/${repo}/contents/content/blog`);
            const files = await res.json();
            
            articles = await Promise.all(files.reverse().map(async f => {
                const r = await fetch(f.download_url);
                const t = await r.text();
                const m = { title: "כתבה", category: "כללי", img: "", body: "", position: "grid" };
                const parts = t.split('---');
                parts[0].split('\n').forEach(l => {
                    if (l.startsWith('title:')) m.title = l.split(':')[1].trim().replace(/['"]/g, '');
                    if (l.startsWith('category:')) m.category = l.split(':')[1].trim().replace(/['"]/g, '');
                    if (l.startsWith('position:')) m.position = l.split(':')[1].trim().toLowerCase();
                    if (l.startsWith('thumbnail:')) {
                        let img = l.split(':')[1].trim().replace(/['"]/g, '');
                        m.img = img.startsWith('http') ? img : rawBase + "images/" + img.replace(/^\/?images\//, '');
                    }
                });
                m.body = parts.slice(1).join('---').trim();
                return m;
            }));
            render();
        } catch(e) { console.error(e); }
    }

    function render() {
        // תפריט
        const cats = ['הכל', ...new Set(articles.map(a => a.category))];
        document.getElementById('main-nav').innerHTML = cats.map(c => `<div class="nav-link" onclick="filterCat('${c}')">${c}</div>`).join('');

        // השמת כתבות לפי Position
        const main = articles.find(a => a.position === 'main') || articles[0];
        const side = articles.filter(a => a.position === 'stack').slice(0, 2);
        const grid = articles.filter(a => a !== main && !side.includes(a));

        if(main) {
            document.getElementById('main-slot').innerHTML = `
                <div onclick="openArt(articles.indexOf(articles.find(a=>a.title==='${main.title.replace(/'/g,"\\'")}')))" style="height:100%">
                    <img src="${main.img}" style="width:100%; height:100%; object-fit:cover;">
                    <div class="overlay"><h2>${main.title}</h2></div>
                </div>`;
        }

        document.getElementById('side-slots').innerHTML = side.map(a => `
            <div class="hero-side-item" onclick="openArt(articles.indexOf(articles.find(x=>x.title==='${a.title.replace(/'/g,"\\'")}')))">
                <img src="${a.img}" style="width:100%; height:100%; object-fit:cover;">
                <div class="overlay"><h2 style="font-size:1.1rem;">${a.title}</h2></div>
            </div>`).join('');

        document.getElementById('news-grid').innerHTML = grid.map(a => `
            <div class="news-card" onclick="openArt(articles.indexOf(articles.find(x=>x.title==='${a.title.replace(/'/g,"\\'")}')))">
                <img src="${a.img}">
                <div class="card-body">
                    <div style="color:var(--accent); font-weight:800; font-size:0.8rem;">${a.category}</div>
                    <h3 style="margin:5px 0; font-size:1.1rem;">${a.title}</h3>
                </div>
            </div>`).join('');
    }

    function openArt(idx) {
        const a = articles[idx];
        document.getElementById('home-view').style.display='none';
        document.getElementById('article-view').style.display='block';
        document.getElementById('art-content').innerHTML = `
            <div style="color:var(--accent); font-weight:800;">${a.category}</div>
            <h1 style="font-family:'Frank Ruhl Libre'; font-size:2.5rem; margin-top:10px;">${a.title}</h1>
            <img src="${a.img}" style="width:100%; border-radius:10px; margin:20px 0;">
            <div style="font-size:1.3rem; line-height:1.7;">${a.body}</div>`;
        window.scrollTo(0,0);
    }

    function showHome() {
        document.getElementById('home-view').style.display='block';
        document.getElementById('article-view').style.display='none';
    }

    init();
</script>
</body>
</html>
