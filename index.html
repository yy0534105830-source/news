<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חדשות חרדים | הפורטל המרכזי</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&family=Frank+Ruhl+Libre:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #002347; --accent: #c5a059; --danger: #e31e24;
            --bg: #f4f7f9; --white: #ffffff; --text: #1a1a1a;
            --radius: 8px; --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }

        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); margin: 0; color: var(--text); line-height: 1.6; }

        /* --- Header & Nav --- */
        header { background: var(--primary); padding: 25px; text-align: center; color: white; border-bottom: 4px solid var(--accent); cursor: pointer; }
        header h1 { font-family: 'Frank Ruhl Libre', serif; font-size: 3.5rem; margin: 0; }
        .nav-wrapper { background: white; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 15px 40px; display: flex; justify-content: center; gap: 30px; }
        .nav-link { font-weight: 800; color: var(--primary); cursor: pointer; font-size: 1.1rem; }

        .container { max-width: 1400px; margin: 25px auto; padding: 0 20px; }

        /* --- Hero Section - המבנה המקורי --- */
        .hero-section { display: flex; gap: 20px; height: 500px; margin-bottom: 40px; }
        .hero-medium { flex: 1.5; position: relative; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); background: #eee; cursor: pointer; }
        .hero-stack { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .hero-small { flex: 1; position: relative; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); background: #eee; cursor: pointer; }
        
        /* תיבת המבזקים המשופרת */
        .hero-flashes { width: 320px; background: white; border-radius: var(--radius); border-top: 4px solid var(--danger); box-shadow: var(--shadow); display: flex; flex-direction: column; overflow: hidden; }
        .flashes-head { padding: 15px; font-weight: 800; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #eee; background: white; }
        .live-dot { width: 10px; height: 10px; background: var(--danger); border-radius: 50%; animation: pulse 1s infinite; }
        
        /* המבזקים עצמם - מוצגים בצורה נקייה */
        .flashes-content { flex: 1; width: 100%; border: none; margin-top: -50px; } /* מסתיר את כותרת האתר המקורי */

        /* --- News Grid --- */
        .news-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .news-card { background: white; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); cursor: pointer; transition: 0.3s; }
        .news-card:hover { transform: translateY(-3px); }
        .news-card img { width: 100%; height: 170px; object-fit: cover; }
        .card-content { padding: 15px; }

        .overlay-text { position: absolute; bottom: 0; padding: 20px; background: linear-gradient(transparent, rgba(0,0,0,0.85)); color: white; width: 100%; box-sizing: border-box; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        @media (max-width: 1100px) { .hero-section { flex-direction: column; height: auto; } .hero-flashes { width: 100%; height: 450px; } .news-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

<header onclick="window.location.reload()"><h1>חדשות חרדים</h1></header>
<div class="nav-wrapper" id="main-nav"></div>

<div class="container" id="home-view">
    <div class="hero-section">
        <div id="hero-med" class="hero-medium"></div>
        <div id="hero-center" class="hero-stack"></div>

        <div class="hero-flashes">
            <div class="flashes-head"><div class="live-dot"></div>מבזקי חדשות</div>
            <div style="flex: 1; overflow: hidden;">
                <iframe class="flashes-content" src="https://www.n12.co.il/Tag/מבזקים"></iframe>
            </div>
        </div>
    </div>

    <div id="row-1" class="news-grid"></div>
</div>

<div id="article-view" class="container" style="display:none; background:white; padding:40px; border-radius:var(--radius);">
    <button onclick="showHome()" style="background:var(--primary); color:white; border:none; padding:10px 20px; cursor:pointer; margin-bottom:20px;">← חזרה לראשי</button>
    <div id="art-content"></div>
</div>

<script>
    const repo = 'yy0534105830-source/news';
    const rawBase = 'https://raw.githubusercontent.com/' + repo + '/main/';
    let articles = [];

    async function start() {
        fetchArticles();
    }

    async function fetchArticles() {
        try {
            const res = await fetch(`https://api.github.com/repos/${repo}/contents/content/blog`);
            const files = await res.json();
            
            articles = await Promise.all(files.reverse().map(async f => {
                const r = await fetch(f.download_url);
                const t = await r.text();
                const m = { title: "ללא כותרת", category: "כללי", img: "", body: "", position: "grid" };
                const lines = t.split('---')[0].split('\n');
                lines.forEach(l => {
                    if (l.startsWith('title:')) m.title = l.split(':')[1].trim().replace(/['"]/g, '');
                    if (l.startsWith('category:')) m.category = l.split(':')[1].trim().replace(/['"]/g, '');
                    if (l.startsWith('position:')) m.position = l.split(':')[1].trim().toLowerCase();
                    if (l.startsWith('thumbnail:')) {
                        let img = l.split(':')[1].trim().replace(/['"]/g, '');
                        m.img = img.startsWith('http') ? img : rawBase + "images/" + img.replace(/^\/?images\//, '');
                    }
                });
                m.body = t.split('---').slice(1).join('---').trim();
                return m;
            }));
            render();
        } catch(e) { console.error(e); }
    }

    function render() {
        if(!articles.length) return;

        const cats = ['הכל', ...new Set(articles.map(a => a.category))];
        document.getElementById('main-nav').innerHTML = cats.map(c => `<div class="nav-link" onclick="filterCat('${c}')">${c}</div>`).join('');

        const main = articles.find(a => a.position === 'main') || articles[0];
        const stack = articles.filter(a => a.position === 'stack').slice(0, 2);
        const grid = articles.filter(a => a !== main && !stack.includes(a));

        document.getElementById('hero-med').innerHTML = `
            <div onclick="openArt('${escape(main.title)}')" style="height:100%">
                <img src="${main.img}" style="width:100%; height:100%; object-fit:cover;">
                <div class="overlay-text"><h2>${main.title}</h2></div>
            </div>`;

        document.getElementById('hero-center').innerHTML = stack.map(a => `
            <div class="hero-small" onclick="openArt('${escape(a.title)}')">
                <img src="${a.img}" style="width:100%; height:100%; object-fit:cover;">
                <div class="overlay-text"><h2 style="font-size:1.1rem;">${a.title}</h2></div>
            </div>`).join('');

        document.getElementById('row-1').innerHTML = grid.map(a => `
            <div class="news-card" onclick="openArt('${escape(a.title)}')">
                <img src="${a.img}">
                <div class="card-content">
                    <span style="color:var(--accent); font-weight:800; font-size:0.8rem;">${a.category}</span>
                    <h3 style="margin:5px 0; font-size:1.1rem;">${a.title}</h3>
                </div>
            </div>`).join('');
    }

    function openArt(title) {
        const a = articles.find(art => art.title === unescape(title));
        document.getElementById('home-view').style.display='none';
        document.getElementById('article-view').style.display='block';
        document.getElementById('art-content').innerHTML = `
            <h1 style="font-family:'Frank Ruhl Libre'; font-size:2.5rem;">${a.title}</h1>
            <img src="${a.img}" style="width:100%; border-radius:10px; margin:20px 0;">
            <div style="font-size:1.3rem; line-height:1.7;">${a.body}</div>`;
        window.scrollTo(0,0);
    }

    function showHome() {
        document.getElementById('home-view').style.display='block';
        document.getElementById('article-view').style.display='none';
    }

    start();
</script>
</body>
</html>
