<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חדשות חרדים | הפורטל המרכזי</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;800&family=Frank+Ruhl+Libre:wght@800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #001a33; --accent: #d4af37; --bg: #f4f7f9; --white: #ffffff; 
            --text: #1c1e21; --card-bg: #ffffff; --radius: 20px; --gap: 25px;
        }

        body.dark-mode {
            --bg: #0a0c10; --white: #161b22; --text: #e6edf3; 
            --card-bg: #1c2128; --primary: #000a14;
        }

        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); margin: 0; color: var(--text); transition: 0.3s; }

        /* Top Bar - Weather & Zmanim */
        .top-bar { 
            background: var(--primary); color: white; padding: 10px 40px; 
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.85rem; border-bottom: 2px solid var(--accent);
        }
        .zmanim-item { margin-left: 15px; padding-left: 15px; border-left: 1px solid rgba(255,255,255,0.2); }
        .zmanim-item:last-child { border-left: none; }
        .zmanim-label { color: var(--accent); font-weight: bold; margin-left: 5px; }

        /* Header */
        header { background: var(--primary); color: white; padding: 40px 20px; text-align: center; position: relative; }
        header h1 { font-family: 'Frank Ruhl Libre', serif; margin: 0; font-size: 3.5rem; letter-spacing: -2px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        
        /* Sticky Nav */
        .nav-wrapper {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.08);
            display: flex; align-items: center; justify-content: space-between; padding: 15px 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }
        body.dark-mode .nav-wrapper { background: rgba(13, 17, 23, 0.9); }

        .nav-link { font-weight: 800; color: var(--primary); cursor: pointer; padding: 10px 22px; border-radius: 50px; transition: 0.3s; }
        body.dark-mode .nav-link { color: var(--accent); }
        .nav-link:hover, .nav-link.active { background: var(--accent); color: white !important; transform: translateY(-2px); }

        /* Breaking News Ticker */
        .ticker-container {
            background: #fff; margin: 25px auto; max-width: 1300px; border-radius: 50px;
            display: flex; align-items: center; padding: 8px 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
        .ticker-btn { background: #d93025; color: white; padding: 5px 18px; border-radius: 20px; font-weight: 900; margin-left: 20px; }

        /* Bento Grid */
        .container { max-width: 1400px; margin: 0 auto; padding: 0 25px; }
        .hero-layout { display: grid; grid-template-columns: 2.5fr 1fr; gap: var(--gap); height: 600px; margin-bottom: 50px; }
        
        .main-slider { position: relative; border-radius: var(--radius); overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
        .slide { position: absolute; inset: 0; opacity: 0; transition: 1.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .slide.active { opacity: 1; }
        .slide img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.85); transition: 0.5s; }
        .slide:hover img { transform: scale(1.03); }
        .slide-text { position: absolute; bottom: 0; padding: 60px 40px; color: white; background: linear-gradient(transparent, rgba(0,0,0,0.95)); width: 100%; }
        .slide-text h2 { font-family: 'Frank Ruhl Libre', serif; font-size: 3rem; margin: 0; line-height: 1.1; }

        .news-list { background: white; border-radius: var(--radius); padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); overflow-y: auto; }
        .news-item { padding: 15px 0; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: 0.2s; }
        .news-item:hover .m-title { color: var(--accent); }
        .m-time { font-size: 0.75rem; color: #d93025; font-weight: bold; display: block; margin-bottom: 5px; }
        .m-title { font-weight: 800; font-size: 1rem; line-height: 1.4; }

        /* Grid Articles */
        .articles-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--gap); }
        .article-card { 
            background: white; border-radius: var(--radius); overflow: hidden; position: relative;
            cursor: pointer; height: 320px; transition: 0.4s; box-shadow: 0 8px 20px rgba(0,0,0,0.04);
        }
        .article-card:hover { transform: translateY(-12px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .article-card img { width: 100%; height: 100%; object-fit: cover; }
        .article-card-overlay { position: absolute; inset: 0; background: linear-gradient(transparent, rgba(0,0,0,0.85)); display: flex; flex-direction: column; justify-content: flex-end; padding: 25px; color: white; }
        .card-cat { position: absolute; top: 20px; right: 20px; background: var(--accent); padding: 5px 15px; border-radius: 10px; font-size: 0.8rem; font-weight: 900; }

        @media (max-width: 1000px) {
            .hero-layout { grid-template-columns: 1fr; height: auto; }
            .main-slider { height: 400px; }
            .articles-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div id="jewish-date">טוען תאריך עברי...</div>
    <div style="display: flex;">
        <span class="zmanim-item"><span class="zmanim-label">נץ:</span> 06:24</span>
        <span class="zmanim-item"><span class="zmanim-label">שמע:</span> 09:05</span>
        <span class="zmanim-item"><span class="zmanim-label">שקיעה:</span> 17:15</span>
        <span class="zmanim-item" id="weather-top">☀️ ירושלים: 21°</span>
    </div>
</div>

<header onclick="showHome()">
    <h1>חדשות חרדים</h1>
    <button class="theme-toggle" onclick="toggleTheme(event)" style="position: absolute; left: 40px; top: 45px; background: rgba(255,255,255,0.1); border: 1px solid var(--accent); color: white; padding: 10px 18px; border-radius: 50px; cursor: pointer; font-size: 1.2rem;">🌙</button>
</header>

<div class="nav-wrapper">
    <nav id="categories-nav"></nav>
    <div class="search-box"><input type="text" id="site-search" placeholder="חפש כתבה או נושא..." oninput="handleSearch()" style="padding: 12px 25px; border-radius: 50px; border: 1px solid #ddd; outline: none; width: 250px;"></div>
</div>

<div class="ticker-container">
    <div class="ticker-btn">מבזק</div>
    <marquee id="ticker-text" behavior="scroll" direction="right" scrollamount="6" style="font-weight: 700; font-size: 1.1rem; color: var(--primary);"></marquee>
</div>

<div class="container" id="home-view">
    <div class="hero-layout">
        <div class="main-slider" id="main-slider"></div>
        <div class="news-list">
            <h2 style="margin-top:0; border-bottom: 3px solid var(--accent); padding-bottom: 10px; font-size: 1.4rem;">החדשות האחרונות</h2>
            <div id="list-items"></div>
        </div>
    </div>
    
    <div id="dynamic-content"></div>
</div>

<div class="container" id="article-view" style="display:none; background: white; padding: 50px; border-radius: var(--radius); margin-top: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.05);">
    <button onclick="showHome()" style="background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 50px; cursor: pointer; font-weight: 800; margin-bottom: 30px;">→ חזרה לראשי</button>
    <div id="full-article-content"></div>
</div>

<script>
    const repo = 'yy0534105830-source/news';
    const baseUrl = 'https://yy0534105830-source.github.io/news/';
    let allArticles = [];
    let currentSlide = 0;

    function toggleTheme(e) {
        e.stopPropagation();
        document.body.classList.toggle('dark-mode');
    }

    async function loadData() {
        // עדכון תאריך עברי (סימולציה למטרה עיצובית)
        document.getElementById('jewish-date').innerText = "יום שישי, י' בשבט תשפ\"ד | פרשת בשלח";

        try {
            const res = await fetch(`https://api.github.com/repos/${repo}/contents/content/blog`);
            const files = (await res.json()).reverse();
            const promises = files.map(async f => {
                const r = await fetch(f.download_url);
                const t = await r.text();
                const meta = { title: "חדשות", category: "כללי", img: "" };
                t.split('\n').slice(0, 15).forEach(line => {
                    if (line.startsWith('title:')) meta.title = line.split(':')[1].trim().replace(/['"]/g, '');
                    if (line.startsWith('thumbnail:')) meta.img = line.split(':')[1].trim().replace(/['"]/g, '');
                    if (line.startsWith('category:')) meta.category = line.split(':')[1].trim().replace(/['"]/g, '');
                });
                if (meta.img && !meta.img.startsWith('http')) meta.img = baseUrl + meta.img;
                return { ...meta, body: t.split('---').pop().trim() };
            });
            
            allArticles = await Promise.all(promises);
            buildCategoriesNav();
            renderUI();
            startSlider();
        } catch (e) { console.error(e); }
    }

    function buildCategoriesNav() {
        const nav = document.getElementById('categories-nav');
        const categories = ['הכל', ...new Set(allArticles.map(a => a.category))];
        nav.innerHTML = categories.map(cat => `<div class="nav-link ${cat === 'הכל' ? 'active' : ''}" onclick="filterBy('${cat}', this)">${cat}</div>`).join('');
    }

    function renderUI() {
        // Slider
        document.getElementById('main-slider').innerHTML = allArticles.slice(0,3).map((a, i) => `
            <div class="slide ${i === 0 ? 'active' : ''}" onclick="openArticle(${allArticles.indexOf(a)})">
                <img src="${a.img}">
                <div class="slide-text"><h2>${a.title}</h2></div>
            </div>
        `).join('');

        // Ticker & List
        document.getElementById('ticker-text').innerText = allArticles.slice(0,8).map(a => a.title).join(' • ');
        document.getElementById('list-items').innerHTML = allArticles.slice(0,10).map(a => `
            <div class="news-item" onclick="openArticle(${allArticles.indexOf(a)})">
                <span class="m-time">לפני זמן קצר</span>
                <span class="m-title">${a.title}</span>
            </div>
        `).join('');

        // Articles Grid
        renderArticles(allArticles.slice(3, 23));
    }

    function renderArticles(data) {
        document.getElementById('dynamic-content').innerHTML = `<div class="articles-grid">${data.map(a => `
            <div class="article-card" onclick="openArticle(${allArticles.indexOf(a)})">
                <div class="card-cat">${a.category}</div>
                <img src="${a.img}">
                <div class="article-card-overlay"><h3>${a.title}</h3></div>
            </div>
        `).join('')}</div>`;
    }

    function startSlider() {
        setInterval(() => {
            const slides = document.querySelectorAll('.slide');
            if(slides.length < 2) return;
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }, 6000);
    }

    function filterBy(cat, el) {
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        const filtered = cat === 'הכל' ? allArticles : allArticles.filter(a => a.category === cat);
        renderArticles(filtered);
    }

    function handleSearch() {
        const q = document.getElementById('site-search').value.toLowerCase();
        renderArticles(allArticles.filter(a => a.title.toLowerCase().includes(q)));
    }

    function openArticle(idx) {
        const a = allArticles[idx];
        document.getElementById('home-view').style.display = 'none';
        document.getElementById('article-view').style.display = 'block';
        document.getElementById('full-article-content').innerHTML = `
            <h1 style="font-family:'Frank Ruhl Libre', serif; font-size:3.8rem; line-height:1; margin-bottom:15px;">${a.title}</h1>
            <div style="background: var(--accent); color:white; display:inline-block; padding:5px 20px; border-radius:10px; font-weight:800; margin-bottom:30px;">${a.category}</div>
            <img src="${a.img}" style="width:100%; max-height:650px; object-fit:cover; border-radius:25px; box-shadow: 0 20px 50px rgba(0,0,0,0.1);">
            <div style="font-size:1.5rem; line-height:1.9; margin-top:40px; color:#333; white-space: pre-wrap; font-weight:500;">${a.body}</div>
        `;
        window.scrollTo(0,0);
    }

    function showHome() {
        document.getElementById('home-view').style.display = 'block';
        document.getElementById('article-view').style.display = 'none';
    }

    loadData();
</script>
</body>
</html>
