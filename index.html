<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חדשות חרדים | הפורטל המרכזי</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&family=Frank+Ruhl+Libre:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #002347; --accent: #c5a059; --danger: #e31e24;
            --bg: #f4f7f9; --white: #ffffff; --text: #1a1a1a;
            --radius: 8px; --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }

        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); margin: 0; color: var(--text); line-height: 1.6; }

        .top-info-bar { background: #eee; border-bottom: 1px solid #ddd; padding: 10px 40px; display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: 700; }
        header { background: var(--primary); padding: 25px; text-align: center; color: white; border-bottom: 4px solid var(--accent); cursor: pointer; }
        header h1 { font-family: 'Frank Ruhl Libre', serif; font-size: 3.5rem; margin: 0; }

        .nav-wrapper { background: white; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 15px 40px; display: flex; justify-content: center; }
        nav { display: flex; gap: 30px; }
        .nav-link { font-weight: 800; color: var(--primary); cursor: pointer; font-size: 1.1rem; }

        .container { max-width: 1400px; margin: 25px auto; padding: 0 20px; }

        /* --- Hero Section --- */
        .hero-section { display: flex; gap: 20px; height: 500px; margin-bottom: 40px; }
        .hero-medium { flex: 1.5; position: relative; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); background: #eee; }
        .hero-stack { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .hero-small { flex: 1; position: relative; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); background: #eee; }
        
        .hero-flashes { width: 320px; background: white; border-radius: var(--radius); border-top: 4px solid var(--danger); box-shadow: var(--shadow); display: flex; flex-direction: column; overflow: hidden; }
        .flashes-head { padding: 15px; font-weight: 800; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #eee; }
        .live-dot { width: 10px; height: 10px; background: var(--danger); border-radius: 50%; animation: pulse 1s infinite; }
        .flashes-body { flex: 1; overflow-y: auto; background: #fff; }
        
        .flash-row { padding: 12px 15px; border-bottom: 1px dotted #ccc; font-size: 0.95rem; font-weight: 700; text-decoration: none; color: #333; display: block; }
        .flash-time { color: var(--danger); margin-left: 8px; }

        .news-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .news-card { background: white; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); cursor: pointer; }
        .news-card img { width: 100%; height: 170px; object-fit: cover; }
        .card-content { padding: 15px; }

        .overlay-text { position: absolute; bottom: 0; padding: 20px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); color: white; width: 100%; box-sizing: border-box; }
        .divider { margin: 50px 0; border-top: 2px solid var(--primary); position: relative; text-align: center; }
        .divider span { position: absolute; top: -16px; left: 50%; transform: translateX(-50%); background: var(--bg); padding: 0 25px; font-weight: 900; color: var(--primary); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        @media (max-width: 1100px) { .hero-section { flex-direction: column; height: auto; } .hero-flashes { width: 100%; height: 300px; } }
    </style>
</head>
<body>

<div class="top-info-bar">
    <div id="date-heb">טוען תאריך...</div>
    <div>בני ברק: 21°C | הדלקת נרות: 17:15</div>
</div>

<header onclick="location.reload()"><h1>חדשות חרדים</h1></header>

<div class="nav-wrapper"><nav id="main-nav"></nav></div>

<div class="container" id="home-view">
    <div class="hero-section">
        <div id="hero-med" class="hero-medium"></div>
        <div id="hero-center" class="hero-stack"></div>
        <div class="hero-flashes">
            <div class="flashes-head"><div class="live-dot"></div>מבזקי "כל רגע"</div>
            <div id="flashes-list" class="flashes-body">
                <div style="padding:20px; font-size:0.9rem; color:#666; text-align:center;">מנסה להתחבר למבזקים...</div>
            </div>
        </div>
    </div>

    <div id="row-1" class="news-grid"></div>
    <div class="divider"><span>עוד כתבות מהשטח</span></div>
    <div id="more-rows" class="news-grid"></div>
</div>

<div id="article-view" class="container" style="display:none; background:white; padding:40px; border-radius:var(--radius);">
    <button onclick="showHome()" style="background:var(--primary); color:white; border:none; padding:10px 20px; cursor:pointer; margin-bottom:20px;">← חזרה לראשי</button>
    <div id="art-content"></div>
</div>

<script>
    const repo = 'yy0534105830-source/news';
    const rawBase = 'https://raw.githubusercontent.com/' + repo + '/main/';
    let articles = [];

    async function start() {
        try {
            const options = { calendar: 'hebrew', dateStyle: 'full' };
            document.getElementById('date-heb').innerText = new Intl.DateTimeFormat('he-IL-u-ca-hebrew', options).format(new Date());
        } catch(e) {}

        fetchFlashes();
        fetchArticles();
    }

    async function fetchFlashes() {
        const flashesList = document.getElementById('flashes-list');
        // נסיון טעינה דרך פרוקסי אלטרנטיבי (AllOrigins) כדי לעקוף חסימות CORS
        const rssUrl = "https://www.kore.co.il/rss";
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}`;

        try {
            const res = await fetch(proxyUrl);
            const data = await res.json();
            
            // המרה של XML ל-JSON
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(data.contents, "text/xml");
            const items = xmlDoc.querySelectorAll("item");
            
            if(items.length > 0) {
                let html = "";
                items.forEach(item => {
                    const title = item.querySelector("title").textContent;
                    const link = item.querySelector("link").textContent;
                    const pubDate = new Date(item.querySelector("pubDate").textContent);
                    const time = pubDate.toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit'});
                    html += `<a href="${link}" target="_blank" class="flash-row"><span class="flash-time">${time}</span> ${title}</a>`;
                });
                flashesList.innerHTML = html;
            } else {
                throw new Error("No items found");
            }
        } catch (e) {
            console.error("Flash Error:", e);
            flashesList.innerHTML = '<div style="padding:20px; text-align:center;">המבזקים בטעינה... במידה ולא נטען, ניתן להתעדכן ישירות באתר "כל רגע"</div>';
        }
    }

    async function fetchArticles() {
        try {
            const bRes = await fetch(`https://api.github.com/repos/${repo}/contents/content/blog`);
            const bFiles = await bRes.json();
            
            articles = await Promise.all(bFiles.reverse().map(async f => {
                const r = await fetch(f.download_url);
                const t = await r.text();
                const m = { title: "כתבה", category: "כללי", img: "", body: "" };
                t.split('\n').forEach(l => {
                    if (l.startsWith('title:')) m.title = l.split(':')[1].trim().replace(/['"]/g, '');
                    if (l.startsWith('category:')) m.category = l.split(':')[1].trim().replace(/['"]/g, '');
                    if (l.startsWith('thumbnail:')) {
                        let img = l.split(':')[1].trim().replace(/['"]/g, '');
                        m.img = img.startsWith('http') ? img : rawBase + "images/" + img.replace(/^\/?images\//, '');
                    }
                });
                m.body = t.split('---').pop().trim();
                return m;
            }));
            render();
        } catch(e) { console.error(e); }
    }

    function render() {
        if(!articles.length) return;
        
        const cats = ['הכל', ...new Set(articles.map(a => a.category))];
        document.getElementById('main-nav').innerHTML = cats.map(c => `<div class="nav-link">${c}</div>`).join('');

        document.getElementById('hero-med').innerHTML = `
            <div onclick="openArt(0)" style="height:100%; cursor:pointer;">
                <img src="${articles[0].img}" style="width:100%; height:100%; object-fit:cover;">
                <div class="overlay-text"><h2>${articles[0].title}</h2></div>
            </div>`;

        document.getElementById('hero-center').innerHTML = articles.slice(1,3).map((a,i) => `
            <div class="hero-small" onclick="openArt(${i+1})">
                <img src="${a.img}" style="width:100%; height:100%; object-fit:cover;">
                <div class="overlay-text"><h2 style="font-size:1.1rem;">${a.title}</h2></div>
            </div>`).join('');

        document.getElementById('row-1').innerHTML = articles.slice(3,7).map((a,i) => createCard(a, i+3)).join('');
        document.getElementById('more-rows').innerHTML = articles.slice(7,19).map((a,i) => createCard(a, i+7)).join('');
    }

    function createCard(a, idx) {
        return `
            <div class="news-card" onclick="openArt(${idx})">
                <img src="${a.img}">
                <div class="card-content">
                    <span style="color:var(--accent); font-weight:800; font-size:0.75rem;">${a.category}</span>
                    <h3 style="font-size:1rem; margin:5px 0;">${a.title}</h3>
                </div>
            </div>`;
    }

    function openArt(idx) {
        const a = articles[idx];
        document.getElementById('home-view').style.display='none';
        document.getElementById('article-view').style.display='block';
        document.getElementById('art-content').innerHTML = `
            <h1 style="font-family:'Frank Ruhl Libre'; font-size:2.5rem;">${a.title}</h1>
            <img src="${a.img}" style="width:100%; border-radius:10px; margin-bottom:20px;">
            <div style="font-size:1.3rem;">${a.body}</div>`;
        window.scrollTo(0,0);
    }

    function showHome() {
        document.getElementById('home-view').style.display='block';
        document.getElementById('article-view').style.display='none';
    }

    start();
</script>
</body>
</html>
