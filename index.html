<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חדשות חרדים | הפורטל המרכזי</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&family=Frank+Ruhl+Libre:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #002347; --accent: #c5a059; --danger: #e31e24;
            --bg: #f4f7f9; --white: #ffffff; --border: #d1d5db; --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }

        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); margin: 0; color: #1a1a1a; line-height: 1.6; }

        /* שורת מידע עליונה */
        .top-info-bar { background: #eee; border-bottom: 1px solid #ddd; padding: 10px 40px; display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: 700; }
        
        header { background: var(--primary); padding: 25px; text-align: center; color: white; border-bottom: 4px solid var(--accent); cursor: pointer; }
        header h1 { font-family: 'Frank Ruhl Libre', serif; font-size: 3.5rem; margin: 0; letter-spacing: -1px; }

        .nav-wrapper { background: white; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 10px; display: flex; justify-content: center; }
        nav { display: flex; gap: 20px; }
        .nav-link { font-weight: 800; color: var(--primary); cursor: pointer; padding: 5px 15px; font-size: 1.1rem; }

        .container { max-width: 1400px; margin: 25px auto; padding: 0 20px; }

        /* HERO LAYOUT */
        .hero-layout { display: grid; grid-template-columns: 2fr 1fr 320px; gap: 20px; height: 500px; margin-bottom: 40px; }

        .hero-main { position: relative; border-radius: 8px; overflow: hidden; box-shadow: var(--shadow); cursor: pointer; }
        .hero-stack { display: grid; grid-template-rows: 1fr 1fr; gap: 20px; }
        .hero-small { position: relative; border-radius: 8px; overflow: hidden; box-shadow: var(--shadow); cursor: pointer; }
        
        /* מבזקי "כל רגע" */
        .hero-flashes { background: white; border-radius: 8px; border-top: 4px solid var(--primary); box-shadow: var(--shadow); display: flex; flex-direction: column; overflow: hidden; }
        .flashes-head { padding: 15px; font-weight: 800; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; color: var(--primary); }
        .live-dot { width: 10px; height: 10px; background: var(--danger); border-radius: 50%; animation: pulse 1s infinite; }
        .flashes-body { flex: 1; overflow-y: auto; }
        .flash-item { padding: 12px; border-bottom: 1px solid #f0f0f0; font-size: 0.95rem; font-weight: 700; cursor: pointer; text-decoration: none; color: inherit; display: block; transition: 0.2s; }
        .flash-item:hover { background: #f0f4f8; color: var(--accent); }
        .flash-time { color: var(--primary); margin-left: 8px; font-size: 0.8rem; }

        .img-fit { width: 100%; height: 100%; object-fit: cover; transition: 0.4s; }
        .text-overlay { position: absolute; bottom: 0; padding: 20px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); color: white; width: 100%; box-sizing: border-box; }

        .news-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .news-card { background: white; border-radius: 8px; overflow: hidden; box-shadow: var(--shadow); cursor: pointer; border: 1px solid #eee; transition: 0.3s; }
        .news-card:hover { transform: translateY(-5px); }
        .news-card img { width: 100%; height: 170px; object-fit: cover; }
        .card-content { padding: 15px; }

        .divider { margin: 50px 0; border-top: 2px solid var(--primary); position: relative; text-align: center; }
        .divider span { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); background: var(--bg); padding: 0 25px; font-weight: 900; color: var(--primary); font-size: 1.3rem; }

        footer { background: var(--primary); color: white; padding: 60px 40px; margin-top: 60px; }
        .footer-grid { max-width: 1300px; margin: 0 auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 50px; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="top-info-bar">
    <div>
        <span id="heb-date">טוען תאריך...</span> | 
        <span id="weather-info">בני ברק: טוען...</span>
    </div>
    <div>הדלקת נרות: 17:15 | צאת השבת: 18:28</div>
</div>

<header onclick="showHome()"><h1>חדשות חרדים</h1></header>

<div class="nav-wrapper"><nav id="main-nav"></nav></div>

<div class="container" id="home-view">
    <div class="hero-layout">
        <div id="hero-main" class="hero-main"></div>
        <div id="hero-stack" class="hero-stack"></div>
        <div class="hero-flashes">
            <div class="flashes-head"><div class="live-dot"></div>מבזקי "כל רגע"</div>
            <div id="flashes-list" class="flashes-body"></div>
        </div>
    </div>

    <div id="row-1" class="news-grid"></div>
    <div class="divider"><span>עוד כתבות מהשטח</span></div>
    <div id="more-rows" class="news-grid"></div>
</div>

<div id="article-view" class="container" style="display:none; background:white; padding:40px; border-radius:8px;">
    <button onclick="showHome()" style="background:var(--primary); color:white; border:none; padding:10px 20px; cursor:pointer; font-weight:800; margin-bottom:20px;">← חזרה</button>
    <div id="art-content"></div>
</div>

<footer>
    <div class="footer-grid">
        <div class="footer-col"><h3>ניווט</h3><div id="footer-nav"></div></div>
        <div class="footer-col"><h3>צור קשר</h3><p>מייל האדום: news@haredi.co.il</p></div>
        <div class="footer-col"><h3>אודות</h3><p>הפורטל המוביל למגזר החרדי.</p></div>
    </div>
</footer>

<script>
    const repo = 'yy0534105830-source/news';
    const rawBase = 'https://raw.githubusercontent.com/' + repo + '/main/';
    let articles = [];

    async function start() {
        // 1. תאריך עברי
        const options = { calendar: 'hebrew', dateStyle: 'full' };
        document.getElementById('heb-date').innerText = new Intl.DateTimeFormat('he-IL-u-ca-hebrew', options).format(new Date());

        // 2. מזג אוויר
        try {
            const wRes = await fetch('https://api.open-meteo.com/v1/forecast?latitude=32.08&longitude=34.83&current_weather=true');
            const wData = await wRes.json();
            document.getElementById('weather-info').innerText = `בני ברק: ${Math.round(wData.current_weather.temperature)}°C`;
        } catch(e) {}

        // 3. מבזקי "כל רגע" - שימוש בפיד RSS שלהם
        try {
            // משתמשים ב-rss2json כדי להפוך את ה-XML של כל רגע ל-JSON קריא
            const rssUrl = encodeURIComponent('https://www.kore.co.il/rss');
            const fRes = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`);
            const fData = await fRes.json();
            
            if(fData.status === 'ok') {
                document.getElementById('flashes-list').innerHTML = fData.items.map(item => {
                    // חילוץ שעה בלבד
                    const time = new Date(item.pubDate).toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit'});
                    return `<a class="flash-item" href="${item.link}" target="_blank">
                                <span class="flash-time">${time}</span>${item.title}
                            </a>`;
                }).join('');
            }
        } catch(e) {
            document.getElementById('flashes-list').innerHTML = '<p style="padding:15px;">שגיאה בטעינת מבזקים</p>';
        }

        // 4. טעינת כתבות מ-GitHub
        try {
            const bRes = await fetch(`https://api.github.com/repos/${repo}/contents/content/blog`);
            const bFiles = await bRes.json();
            articles = await Promise.all(bFiles.reverse().map(async f => {
                const r = await fetch(f.download_url);
                const t = await r.text();
                const m = { title: "כתבה", category: "כללי", img: "", body: "" };
                t.split('\n').forEach(l => {
                    if (l.startsWith('title:')) m.title = l.split(':')[1].trim().replace(/['"]/g, '');
                    if (l.startsWith('thumbnail:')) {
                        let img = l.split(':')[1].trim().replace(/['"]/g, '');
                        m.img = img.startsWith('http') ? img : rawBase + "images/" + img.replace(/^\/?images\//, '');
                    }
                });
                m.body = t.split('---').pop().trim();
                return m;
            }));
            render();
        } catch(e) {}
    }

    function render() {
        // Hero
        const a0 = articles[0] || {title: "טוען...", img: ""};
        document.getElementById('hero-main').innerHTML = `<div onclick="openArt(0)" style="height:100%"><img src="${a0.img}" class="img-fit"><div class="text-overlay"><h2>${a0.title}</h2></div></div>`;
        document.getElementById('hero-stack').innerHTML = articles.slice(1,3).map((a,i) => `
            <div class="hero-small" onclick="openArt(${i+1})"><img src="${a.img}" class="img-fit"><div class="text-overlay"><h2 style="font-size:1.1rem;">${a.title}</h2></div></div>`).join('');
        
        // Grid
        document.getElementById('row-1').innerHTML = articles.slice(3,7).map((a,i) => createCard(a, i+3)).join('');
        document.getElementById('more-rows').innerHTML = articles.slice(7,23).map((a,i) => createCard(a, i+7)).join('');
    }

    function createCard(a, idx) {
        return `<div class="news-card" onclick="openArt(${idx})"><img src="${a.img}"><div class="card-content"><h3>${a.title}</h3></div></div>`;
    }

    function openArt(idx) {
        const a = articles[idx];
        document.getElementById('home-view').style.display='none';
        document.getElementById('article-view').style.display='block';
        document.getElementById('art-content').innerHTML = `<h1>${a.title}</h1><img src="${a.img}" style="width:100%; border-radius:8px;"><p style="font-size:1.3rem; margin-top:20px;">${a.body}</p>`;
        window.scrollTo(0,0);
    }

    function showHome() {
        document.getElementById('home-view').style.display='block';
        document.getElementById('article-view').style.display='none';
    }

    start();
</script>
</body>
</html>
