<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JDN Premium | מגזין חדשות</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&family=Frank+Ruhl+Libre:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FFFFFF;
            --text: #1A1A1A;
            --accent: #D4AF37; /* זהב מט יוקרתי */
            --glass: rgba(255, 255, 255, 0.7);
            --card-bg: #f9f9f9;
            --radius: 20px;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        /* Dark Mode Colors */
        body.dark-mode {
            --bg: #0F172A;
            --text: #F8FAFC;
            --accent: #38BDF8;
            --glass: rgba(15, 23, 42, 0.8);
            --card-bg: #1E293B;
        }

        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Assistant', sans-serif; 
            margin: 0; 
            transition: var(--transition);
            line-height: 1.6;
        }

        /* סרגל התקדמות קריאה */
        #progress-bar {
            position: fixed; top: 0; right: 0; height: 4px;
            background: var(--accent); width: 0%; z-index: 1000;
            transition: width 0.1s ease;
        }

        /* Header & Glassmorphism */
        header {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 20px;
            position: sticky; top: 0; z-index: 900;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(128,128,128,0.1);
        }

        header h1 { 
            font-family: 'Frank Ruhl Libre', serif; 
            margin: 0; font-size: 2.2rem; cursor: pointer;
        }

        .dark-toggle {
            background: var(--accent); color: white; border: none;
            padding: 8px 15px; border-radius: 50px; cursor: pointer; font-weight: bold;
        }

        /* Bento Grid Layout */
        .container {
            max-width: 1300px; margin: 40px auto; padding: 0 20px;
        }

        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: minmax(200px, auto);
            gap: 25px;
        }

        .bento-item {
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid rgba(128,128,128,0.05);
        }

        /* Micro-Interactions: Hover effect */
        .bento-item:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        /* היררכיה נועזת: כתבה ראשית גדולה */
        .item-main { grid-column: span 2; grid-row: span 2; }
        .item-tall { grid-row: span 2; }
        .item-wide { grid-column: span 2; }

        .bento-item img {
            width: 100%; height: 100%; object-fit: cover;
            transition: var(--transition);
        }

        .bento-item:hover img { transform: scale(1.05); }

        .item-overlay {
            position: absolute; bottom: 0; right: 0; left: 0;
            padding: 25px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            color: white;
        }

        .item-overlay h2 { 
            font-family: 'Frank Ruhl Libre', serif; 
            margin: 0; font-size: 1.8rem; line-height: 1.2;
        }

        /* Article View (Single) */
        #article-view {
            display: none; max-width: 800px; margin: 50px auto; padding: 20px;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .full-title { font-family: 'Frank Ruhl Libre', serif; font-size: 3.5rem; margin-bottom: 20px; }
        .full-img { width: 100%; border-radius: var(--radius); margin-bottom: 30px; }
        .full-content { font-size: 1.4rem; line-height: 1.8; white-space: pre-wrap; }

        /* Mobile First adjustments */
        @media (max-width: 900px) {
            .bento-grid { grid-template-columns: 1fr; }
            .item-main, .item-tall, .item-wide { grid-column: span 1; grid-row: span 1; }
            .hero-img { height: 300px; }
            .full-title { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

<div id="progress-bar"></div>

<header>
    <h1 onclick="showHome()">JDN PREMIUM</h1>
    <button class="dark-toggle" onclick="toggleDark()">🌓 מצב לילה</button>
</header>

<div class="container" id="home-view">
    <div class="bento-grid" id="bento-target">
        </div>
</div>

<div id="article-view">
    <button onclick="showHome()" style="background:none; border:none; color:var(--accent); cursor:pointer; font-weight:bold; font-size:1.2rem; margin-bottom:20px;">→ חזרה למגזין</button>
    <div id="full-article-content"></div>
</div>

<script>
    const repo = 'yy0534105830-source/news';
    const baseUrl = 'https://yy0534105830-source.github.io/news/';
    let articles = [];

    async function loadData() {
        try {
            const res = await fetch(`https://api.github.com/repos/${repo}/contents/content/blog`);
            const files = (await res.json()).reverse();
            
            const promises = files.slice(0, 10).map(async f => {
                const r = await fetch(f.download_url);
                const t = await r.text();
                const meta = {};
                t.split('\n').forEach(line => {
                    if (line.startsWith('title:')) meta.title = line.replace('title:', '').trim().replace(/['"]/g, '');
                    if (line.startsWith('thumbnail:')) meta.img = line.replace('thumbnail:', '').trim().replace(/['"]/g, '');
                });
                return { 
                    ...meta, 
                    img: meta.img ? (meta.img.startsWith('http') ? meta.img : baseUrl + meta.img.replace(/^\//, '')) : 'https://images.unsplash.com/photo-1504711434969-e33886168f5c?auto=format&fit=crop&w=800',
                    body: t.split('---').pop().trim() 
                };
            });
            articles = await Promise.all(promises);
            renderBento();
        } catch (e) { console.error(e); }
    }

    function renderBento() {
        const target = document.getElementById('bento-target');
        // הגדרת סדר הגריד של בנטו (כל אחד מקבל Class אחר למראה מגוון)
        const layouts = ['item-main', 'item-tall', 'item-wide', '', '', 'item-wide', ''];
        
        target.innerHTML = articles.map((a, i) => `
            <div class="bento-item ${layouts[i] || ''}" onclick="openArticle(${i})">
                <img src="${a.img}" loading="lazy">
                <div class="item-overlay">
                    <h2>${a.title}</h2>
                </div>
            </div>
        `).join('');
    }

    function openArticle(idx) {
        const a = articles[idx];
        document.getElementById('home-view').style.display = 'none';
        const view = document.getElementById('article-view');
        view.style.display = 'block';
        document.getElementById('full-article-content').innerHTML = `
            <h1 class="full-title">${a.title}</h1>
            <img src="${a.img}" class="full-img">
            <div class="full-content">${a.body}</div>
        `;
        window.scrollTo(0, 0);
    }

    function showHome() {
        document.getElementById('home-view').style.display = 'block';
        document.getElementById('article-view').style.display = 'none';
    }

    function toggleDark() {
        document.body.classList.toggle('dark-mode');
    }

    // סרגל התקדמות קריאה
    window.onscroll = function() {
        let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
        let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        let scrolled = (winScroll / height) * 100;
        document.getElementById("progress-bar").style.width = scrolled + "%";
    };

    loadData();
</script>

</body>
</html>
