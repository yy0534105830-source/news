<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חדשות חרדים | הפורטל המרכזי</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&family=Frank+Ruhl+Libre:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #002347; --accent: #c5a059; --danger: #e31e24;
            --bg: #f4f7f9; --white: #ffffff; --border: #d1d5db;
        }

        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); margin: 0; color: #1a1a1a; }

        /* שורת מידע עליונה */
        .top-bar { background: #fff; border-bottom: 1px solid var(--border); padding: 10px 40px; display: flex; justify-content: space-between; font-weight: 700; font-size: 0.9rem; }

        header { background: var(--primary); padding: 30px; text-align: center; color: white; border-bottom: 5px solid var(--accent); cursor: pointer; }
        header h1 { font-family: 'Frank Ruhl Libre', serif; font-size: 3.5rem; margin: 0; }

        /* שורת קטגוריות */
        .nav-wrapper { background: white; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-bottom: 1px solid var(--border); }
        nav { max-width: 1400px; margin: 0 auto; display: flex; justify-content: center; padding: 10px; gap: 20px; }
        .nav-btn { font-weight: 800; color: var(--primary); cursor: pointer; padding: 5px 15px; }

        .container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }

        /* --- חלוקת ה-HERO המבוקשת --- */
        .hero-grid { 
            display: grid; 
            grid-template-columns: 2fr 1fr 300px; /* בינוני, קטנים, מבזקים */
            gap: 20px; 
            height: 550px; 
            margin-bottom: 40px; 
        }

        .hero-main { position: relative; background: #000; border: 1px solid var(--border); cursor: pointer; }
        .hero-stack { display: grid; grid-template-rows: 1fr 1fr; gap: 20px; }
        .hero-sub { position: relative; background: #000; border: 1px solid var(--border); cursor: pointer; }

        .hero-flashes { 
            background: white; border: 1px solid var(--border); border-top: 4px solid var(--danger); 
            display: flex; flex-direction: column; overflow: hidden;
        }
        .flashes-head { padding: 15px; font-weight: 800; background: #f8f8f8; border-bottom: 1px solid #eee; color: var(--danger); display: flex; align-items: center; gap: 10px; }
        .flash-list { flex: 1; overflow-y: auto; }
        .flash-link { padding: 12px; border-bottom: 1px solid #f0f0f0; display: block; text-decoration: none; color: inherit; font-size: 0.95rem; font-weight: 700; }
        .flash-link:hover { background: #fff5f5; }
        .flash-time { color: var(--danger); margin-left: 8px; font-size: 0.8rem; }

        /* --- גריד כתבות (4 בשורה) --- */
        .news-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: white; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 180px; object-fit: cover; border-bottom: 1px solid var(--border); }
        .card-inner { padding: 15px; }
        .card-cat { color: var(--accent); font-weight: 800; font-size: 0.75rem; display: block; margin-bottom: 5px; }
        .card-title { font-weight: 700; font-size: 1.1rem; margin: 0; line-height: 1.4; }

        .divider { margin: 50px 0; border-top: 3px solid var(--primary); position: relative; text-align: center; }
        .divider span { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); background: var(--bg); padding: 0 20px; font-weight: 900; color: var(--primary); font-size: 1.3rem; }

        .overlay { position: absolute; bottom: 0; width: 100%; padding: 20px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); color: white; box-sizing: border-box; }
        .img-fit { width: 100%; height: 100%; object-fit: cover; }

        /* פוטר */
        footer { background: var(--primary); color: white; padding: 50px 40px; margin-top: 60px; }
        .footer-content { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 50px; }
        .footer-col h3 { color: var(--accent); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="top-bar">
    <div id="cur-date">טוען תאריך עברי...</div>
    <div id="cur-weather">בני ברק: <strong>21°C</strong> | בהיר</div>
</div>

<header onclick="location.reload()"><h1>חדשות חרדים</h1></header>

<div class="nav-wrapper"><nav id="category-nav"></nav></div>

<div class="container" id="home-page">
    <div class="hero-grid">
        <div id="hero-main-box" class="hero-main"></div>
        <div id="hero-sub-boxes" class="hero-stack"></div>
        <div class="hero-flashes">
            <div class="flashes-head"><span style="width:10px; height:10px; background:red; border-radius:50%; animation:blink 1s infinite;"></span>מבזקי N12 בזמן אמת</div>
            <div id="flashes-content" class="flash-list"></div>
        </div>
    </div>

    <div id="row-1" class="news-grid"></div>

    <div id="row-2" class="news-grid"></div>

    <div class="divider"><span>עוד כתבות מהשטח</span></div>

    <div id="more-rows" class="news-grid"></div>
</div>

<div id="article-page" class="container" style="display:none; background:white; padding:40px; border:1px solid var(--border);">
    <button onclick="showHome()" style="background:var(--primary); color:white; border:none; padding:10px 20px; cursor:pointer; font-weight:800; margin-bottom:20px;">← חזרה לראשי</button>
    <div id="full-article"></div>
</div>

<footer>
    <div class="footer-content">
        <div class="footer-col">
            <h3>ניווט מהיר</h3>
            <div id="footer-cats"></div>
        </div>
        <div class="footer-col">
            <h3>יצירת קשר</h3>
            <p>מייל האדום: <b>editor@haredi-news.co.il</b></p>
            <p>וואטסאפ: <b>050-123-4567</b></p>
        </div>
        <div class="footer-col">
            <h3>אודות</h3>
            <p>הפורטל המוביל לחדשות המגזר החרדי. עדכונים שוטפים, מבזקים וכתבות עומק.</p>
        </div>
    </div>
</footer>

<script>
    const repo = 'yy0534105830-source/news';
    const rawBase = 'https://raw.githubusercontent.com/' + repo + '/main/';
    let allArticles = [];

    async function init() {
        // 1. תאריך עברי
        const dOptions = { calendar: 'hebrew', dateStyle: 'full' };
        document.getElementById('cur-date').innerText = new Intl.DateTimeFormat('he-IL-u-ca-hebrew', dOptions).format(new Date());

        // 2. מזג אוויר (Open-Meteo)
        try {
            const wRes = await fetch('https://api.open-meteo.com/v1/forecast?latitude=32.08&longitude=34.83&current_weather=true');
            const wData = await wRes.json();
            document.getElementById('cur-weather').innerHTML = `בני ברק: <strong>${Math.round(wData.current_weather.temperature)}°C</strong> | בהיר`;
        } catch(e) {}

        // 3. מבזקי N12 (עם Proxy למניעת חסימות)
        try {
            const fRes = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fwww.mako.co.il%2Ffeeds%2FNews-hamaid-mivzakim.xml&api_key=yh7f0qjsi6skp7fghf9z9y0uok8yvof0zbxp2v0s');
            const fData = await fRes.json();
            if(fData.items) {
                document.getElementById('flashes-content').innerHTML = fData.items.slice(0, 15).map(item => {
                    const time = new Date(item.pubDate).toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
                    return `<a href="${item.link}" target="_blank" class="flash-link"><span class="flash-time">${time}</span>${item.title}</a>`;
                }).join('');
            }
        } catch(e) { document.getElementById('flashes-content').innerHTML = '<p style="padding:15px;">טוען מבזקים...</p>'; }

        // 4. טעינת כתבות מ-GitHub
        try {
            const bRes = await fetch(`https://api.github.com/repos/${repo}/contents/content/blog`);
            const bFiles = await bRes.json();
            allArticles = await Promise.all(bFiles.reverse().map(async f => {
                const r = await fetch(f.download_url);
                const t = await r.text();
                const m = { title: "חדשות", category: "כללי", img: "", body: "" };
                t.split('\n').forEach(l => {
                    if (l.startsWith('title:')) m.title = l.split(':')[1].trim().replace(/['"]/g, '');
                    if (l.startsWith('category:')) m.category = l.split(':')[1].trim().replace(/['"]/g, '');
                    if (l.startsWith('thumbnail:')) m.img = l.split(':')[1].trim().replace(/['"]/g, '').startsWith('http') ? l.split(':')[1].trim().replace(/['"]/g, '') : rawBase + "images/" + l.split(':')[1].trim().replace(/['"]/g, '').replace(/^\/?images\//, '');
                });
                m.body = t.split('---').pop().trim();
                return m;
            }));
            render();
        } catch(e) { console.error("Error loading articles", e); }
    }

    function render() {
        const cats = ['הכל', ...new Set(allArticles.map(a => a.category))];
        document.getElementById('category-nav').innerHTML = cats.map(c => `<div class="nav-btn" onclick="filter('${c}')">${c}</div>`).join('');
        document.getElementById('footer-cats').innerHTML = cats.map(c => `<p onclick="filter('${c}')" style="cursor:pointer">${c}</p>`).join('');

        // Hero Main
        if(allArticles[0]) {
            document.getElementById('hero-main-box').innerHTML = `
                <div onclick="openNews(0)" style="height:100%">
                    <img src="${allArticles[0].img}" class="img-fit">
                    <div class="overlay"><span>${allArticles[0].category}</span><h2 style="font-size:2rem;margin:5px 0;">${allArticles[0].title}</h2></div>
                </div>`;
        }

        // Hero Sub
        let subHtml = "";
        if(allArticles[1]) subHtml += createSubHero(allArticles[1], 1);
        if(allArticles[2]) subHtml += createSubHero(allArticles[2], 2);
        document.getElementById('hero-sub-boxes').innerHTML = subHtml;

        // Rows
        document.getElementById('row-1').innerHTML = allArticles.slice(3, 7).map((a,i) => createCard(a, i+3)).join('');
        document.getElementById('row-2').innerHTML = allArticles.slice(7, 11).map((a,i) => createCard(a, i+7)).join('');
        document.getElementById('more-rows').innerHTML = allArticles.slice(11, 27).map((a,i) => createCard(a, i+11)).join('');
    }

    function createSubHero(a, idx) {
        return `<div class="hero-sub" onclick="openNews(${idx})"><img src="${a.img}" class="img-fit"><div class="overlay"><h3>${a.title}</h3></div></div>`;
    }

    function createCard(a, idx) {
        return `<div class="card" onclick="openNews(${idx})">
            <img src="${a.img}" onerror="this.src='https://via.placeholder.com/400x250'">
            <div class="card-inner"><span class="card-cat">${a.category}</span><h3 class="card-title">${a.title}</h3></div>
        </div>`;
    }

    function openNews(idx) {
        const a = allArticles[idx];
        document.getElementById('home-page').style.display='none';
        document.getElementById('article-page').style.display='block';
        document.getElementById('full-article').innerHTML = `<h1 style="font-size:2.8rem;">${a.title}</h1><img src="${a.img}" style="width:100%;"><div style="font-size:1.4rem;margin-top:20px;">${a.body}</div>`;
        window.scrollTo(0,0);
    }

    function showHome() {
        document.getElementById('home-page').style.display='block';
        document.getElementById('article-page').style.display='none';
    }

    function filter(c) {
        if(c==='הכל') { render(); return; }
        const f = allArticles.filter(a => a.category === c);
        document.getElementById('row-1').innerHTML = f.map(a => createCard(a, allArticles.indexOf(a))).join('');
        document.getElementById('row-2').innerHTML = ''; document.getElementById('more-rows').innerHTML = '';
        window.scrollTo(0,0);
    }

    init();
</script>
</body>
</html>
