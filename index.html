<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חדשות חרדים | הפורטל המרכזי</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&family=Frank+Ruhl+Libre:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #002d5f; --accent: #c5a059; --bg: #f4f6f8; --white: #ffffff; --radius: 12px;
        }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); margin: 0; color: #1a1a1a; }
        
        header { background: var(--primary); color: var(--white); padding: 20px; text-align: center; border-bottom: 4px solid var(--accent); cursor: pointer; }
        header h1 { font-family: 'Frank Ruhl Libre', serif; margin: 0; font-size: 2.5rem; }

        nav { background: white; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #ddd; display: flex; justify-content: center; padding: 10px; gap: 15px; }
        .nav-link { font-weight: bold; color: var(--primary); cursor: pointer; padding: 5px 12px; border-radius: 20px; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: var(--accent); color: white; }

        .ticker { background: #fff; border-bottom: 1px solid #ddd; height: 40px; display: flex; align-items: center; overflow: hidden; font-weight: bold; }
        .ticker-label { background: #d32f2f; color: #fff; padding: 0 15px; height: 100%; display: flex; align-items: center; }
        .ticker-text { white-space: nowrap; animation: ticker 50s linear infinite; padding-right: 100%; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(100%); } }

        .container { max-width: 1440px; margin: 20px auto; padding: 0 20px; }
        
        /* Grids */
        .hero-bento { display: grid; grid-template-columns: 2fr 1fr; gap: 15px; height: 500px; margin-bottom: 20px; }
        .side-articles { display: grid; grid-template-rows: 1fr 1fr; gap: 15px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }

        /* Cards */
        .card { background: var(--white); border-radius: var(--radius); overflow: hidden; position: relative; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.3s; height: 250px; }
        .hero-bento .card { height: 100%; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-overlay { position: absolute; bottom: 0; width: 100%; padding: 15px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); color: white; box-sizing: border-box; }
        .card h3 { font-family: 'Frank Ruhl Libre', serif; margin: 0; font-size: 1.1rem; line-height: 1.2; }
        .time-tag { position: absolute; top: 10px; right: 10px; background: var(--primary); color: white; padding: 3px 8px; border-radius: 10px; font-size: 0.7rem; }

        #article-view { display: none; background: white; padding: 30px; border-radius: var(--radius); }
        
        @media (max-width: 900px) { .hero-bento, .grid-4, .grid-5 { grid-template-columns: 1fr; height: auto; } .card { height: 250px; } }
    </style>
</head>
<body>

<header onclick="showHome()"><h1>חדשות חרדים</h1></header>

<nav id="main-nav">
    <div class="nav-link active" onclick="filterCategory('הכל')">הכל</div>
    <div class="nav-link" onclick="filterCategory('חצרות קודש')">חצרות קודש</div>
    <div class="nav-link" onclick="filterCategory('פוליטיקה')">פוליטיקה</div>
    <div class="nav-link" onclick="filterCategory('כלכלה')">כלכלה</div>
</nav>

<div class="ticker"><div class="ticker-label">מבזקים</div><div class="ticker-text" id="ticker-target">מעדכן...</div></div>

<div class="container" id="home-view"><div id="news-content"></div></div>

<div class="container" id="article-view">
    <button onclick="showHome()" style="padding:10px 20px; cursor:pointer;">→ חזרה</button>
    <div id="full-article-content"></div>
</div>

<script>
    const repo = 'yy0534105830-source/news';
    const baseUrl = 'https://yy0534105830-source.github.io/news/';
    let allArticles = [];

    async function loadData() {
        try {
            const res = await fetch(`https://api.github.com/repos/${repo}/contents/content/blog`);
            const files = (await res.json()).reverse();
            
            const promises = files.map(async f => {
                const r = await fetch(f.download_url);
                const t = await r.text();
                const meta = { title: "כותרת חסרה", category: "הכל", date: new Date(), img: "" };
                
                t.split('\n').slice(0, 15).forEach(line => {
                    if (line.toLowerCase().startsWith('title:')) meta.title = line.split(':')[1].trim().replace(/['"]/g, '');
                    if (line.toLowerCase().startsWith('thumbnail:')) meta.img = line.split(':')[1].trim().replace(/['"]/g, '');
                    if (line.toLowerCase().startsWith('category:')) meta.category = line.split(':')[1].trim().replace(/['"]/g, '');
                    if (line.toLowerCase().startsWith('date:')) meta.date = line.split(':')[1].trim();
                });

                // תיקון נתיב תמונה
                if (meta.img && !meta.img.startsWith('http')) {
                    meta.img = baseUrl + meta.img.replace(/^\//, '');
                } else if (!meta.img) {
                    meta.img = "https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=800";
                }

                return { ...meta, body: t.split('---').pop().trim() };
            });

            allArticles = await Promise.all(promises);
            renderLayout(allArticles);
            loadFlashes();
        } catch (e) { console.error("Error loading data:", e); }
    }

    function createCard(a) {
        const idx = allArticles.indexOf(a);
        return `
            <div class="card" onclick="openArticle(${idx})">
                <div class="time-tag">🕒 חדש</div>
                <img src="${a.img}">
                <div class="card-overlay"><h3>${a.title}</h3></div>
            </div>`;
    }

    function renderLayout(data) {
        const target = document.getElementById('news-content');
        if (!data.length) return;

        let html = `<div class="hero-bento">
            <div style="grid-column: span 1; height:100%">${createCard(data[0])}</div>
            <div class="side-articles">${data.slice(1,3).map(a => createCard(a)).join('')}</div>
        </div>`;
        
        html += `<div class="grid-4">${data.slice(3,7).map(a => createCard(a)).join('')}</div>`;
        html += `<div class="grid-5">${data.slice(7).map(a => createCard(a)).join('')}</div>`;
        
        target.innerHTML = html;
    }

    function openArticle(idx) {
        const a = allArticles[idx];
        document.getElementById('home-view').style.display = 'none';
        document.getElementById('article-view').style.display = 'block';
        document.getElementById('full-article-content').innerHTML = `
            <h1>${a.title}</h1>
            <img src="${a.img}" style="width:100%; border-radius:12px;">
            <div style="font-size:1.2rem; line-height:1.6; margin-top:20px;">${a.body}</div>
        `;
    }

    function showHome() {
        document.getElementById('home-view').style.display = 'block';
        document.getElementById('article-view').style.display = 'none';
    }

    async function loadFlashes() {
        const res = await fetch(`https://api.github.com/repos/${repo}/contents/content/flashes`);
        const files = (await res.json()).reverse();
        let txt = "";
        for(let f of files.slice(0,5)) {
            const r = await fetch(f.download_url);
            const t = await r.text();
            txt += " • " + (t.match(/title:\s*(.*)/)?.[1] || "מבזק") + "   ";
        }
        document.getElementById('ticker-target').innerText = txt;
    }

    loadData();
</script>
</body>
</html>
